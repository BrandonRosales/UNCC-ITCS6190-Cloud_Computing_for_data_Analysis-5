services:
  spark-master:
    image: apache/spark:4.1.2
    container_name: my-spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./input:/input
      - ./src:/notebooks
      - ./outputs:/outputs

  spark-worker-1:
    image: apache/spark:4.1.2
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    ports:
      - "8081:8081"
    volumes:
      - ./input:/input
      - ./outputs:/outputs

  spark-worker-2:
    image: apache/spark:4.1.2
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    ports:
      - "8082:8081"
    volumes:
      - ./input:/input
      - ./outputs:/outputs
